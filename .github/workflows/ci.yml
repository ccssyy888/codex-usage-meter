name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Core validations
        run: swift run --disable-sandbox CodexMeterCoreTests
      - name: Universal release package
        run: ./scripts/package_release.sh
